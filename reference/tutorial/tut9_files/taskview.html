    function expandCollapseTitle() {
      if (document.getElementById('titleDiv').style.height == "0px") {
          
            var h = document.getElementById('titleP').offsetHeight + 25;
            $('#titleDiv').animate({ height: eval(h) }, animDuration);
            
            document.getElementById('titleSpan').innerHTML = "[&ndash;]";
            
      }
      else {
          $('#titleDiv').animate({ height: 0 }, animDuration);
            document.getElementById('titleSpan').innerHTML = "[+]";
        }

        setTimeout(function() { publishIframeHeight() }, animDuration);
    }


    function expandCollapseFilters() {
      if (document.getElementById('filtersContainer').style.height == "0px") {
        if (document.getElementById('filtersTable') != undefined) {
          var h = document.getElementById('filtersTable').offsetHeight + 35;
          $('#filtersContainer').animate({ height: eval(h) }, animDuration);
          document.getElementById('filterSpan').innerHTML = "[&ndash;]";
        }
      }
      else {
          $('#filtersContainer').animate({ height: 0 }, animDuration);
        document.getElementById('filterSpan').innerHTML = "[+]";
      }
      setTimeout(function() { publishIframeHeight() }, animDuration);
    }

  <script type="text/javascript">
      $(function() {
          var ddllist = document.getElementsByTagName("select");
          for (i = 0; i < ddllist.length; i++) {
              //resetter les DDL des filtres, sauf pour celui du Items per page
              if (ddllist[i].id != 'idDDLMaxItemPage') {
                  ddllist[i].selectedIndex = 0;
              }
          }

          //On roule le webservice pour obtenir les données.
          loadTaskList();
          loadFilters();
          setTimeout("publishIframeHeight()", 500);

          //Fonction pour fermer toutes les div modal.
          $(window).click(function(e) {
              if (e.target.className.indexOf('bBox') < 0) {
                  var h = document.getElementById('searchDiv').style.height;
                  if ((h != "") && (h != "0px")) { expandCollapseSearch($('.imgLoupe')[0]); }

                  var h = document.getElementById('descDiv').style.height;
                  if ((h != "") && (h != "0px")) { expandCollapseDesc($('.imgDesc')[0]); }

                  var h = document.getElementById('filterDiv').style.height;
                  if ((h != "") && (h != "0px")) { expandCollapseFilters($('.imgFilter')[0]); }
              }
          });
      });

      function loadTaskList() {
          var nbItems = document.getElementById('gvItemsCount');
          if (nbItems == undefined) { document.getElementById('nbItemsLbl').innerHTML = ""; }
          else {
              document.getElementById('nbItemsLbl').innerHTML = "&ndash;&nbsp;&nbsp;" + (nbItems.innerText || nbItems.textContent) + " " + ___BlockTaskItems___;
          }

          document.getElementById('lViewData').innerHTML = "";
          var dLst = document.getElementsByClassName('gData');

          //Il n'y a pas de données retournées
          if ($('#tViewData .gList .gData td').length <= 1) {
              $('.showItemLabel').hide();
              //document.getElementById('lViewData').innerHTML = ___BlockTaskDefaultMessage___;
              return;
          }

          var dTemplate = document.getElementById('bDataTemplate').innerHTML;
          for (i = 0; i < dLst.length; i++) {
              var dColumns = dLst[i].getElementsByTagName('td');
              if (dColumns.length > 0) {
                  blockData = (i % 2 == 0) ? dTemplate : dTemplate.replace("normal", "opacity80");
                  blockData = replaceRow(blockData, dColumns);
                  document.getElementById('lViewData').innerHTML += blockData;
              }
          }

          //CQ 3.5 bug fix: I DON'T KNOW WHY BUT IN IE11, THE TOP VALUE RETURN IS ZERO. BUT WHEN I RUN THE CODE A SECOND TIME, THE TOP
          //VALUE IS NOT ZERO ANYMORE. WTF!?!
          var sss = ($('#lViewData').offset()).top;

          var topModal = ($('#lViewData').offset()).top;
          if (($('#titleBarDiv').offset()).top > 9) { $('.bModal').css({ top: (topModal - 5) + 'px' }); }
          else { $('.bModal').css({ top: (topModal - 9) + 'px' }); }
      }


      function replaceRow(dTemplate, dColumns) {
          //Categorie / Sub-categorie
          if ((taskviewCols.Category != undefined) && (taskviewCols.SubCategory != undefined)) {
              var separator = "";
              //On regarde si c'est vide ou nbsp, pour ne pas mettre de séparateur inutilement
              if (dColumns[taskviewCols.Category].innerHTML.trim() != "" && dColumns[taskviewCols.Category].innerHTML.trim() != "&nbsp;")
                  separator = " / ";
              dTemplate = dTemplate.replace("$CatSubCat$", dColumns[taskviewCols.Category].innerHTML + separator + dColumns[taskviewCols.SubCategory].innerHTML);
          }
          else {
              //Categorie
              if (taskviewCols.Category != undefined) { dTemplate = dTemplate.replace("$CatSubCat$", dColumns[taskviewCols.Category].innerHTML); }

              //SubCategorie
              if (taskviewCols.SubCategory != undefined) { dTemplate = dTemplate.replace("$CatSubCat$", dColumns[taskviewCols.SubCategory].innerHTML); }
          }

          if ((taskviewCols.Category == undefined) && (taskviewCols.SubCategory == undefined)) {
              dTemplate = dTemplate.replace("bCat", "displayNone");
              //dTemplate = dTemplate.replace("secondDiv", "firstDiv"); 
          }

          //Description [colonne Obligatoire]
          var myDesc = dColumns[taskviewCols.Desc].getElementsByTagName('div');

          //CQ 3.5: si jamais on a une erreur javascript: "TypeError: Cannot read property 'innerHTML' of undefined ",
          //c'est parce que le html table du gridview n'est pas celui qui appartient a ce block. C'est parce qu'on a un 2e block task dans la page.
          //Quand on fait un next page, ca va loader le session variable de la 2e table dans le webservice.
          //Donc, on ne peut qu'avoir un seul task block pour le moment (a moins qu'on nomme les sessions variable avec le block id)          
          dTemplate = dTemplate.replace("$description$", ((myDesc == undefined) ? dColumns[taskviewCols.Desc].innerHTML : myDesc[0].innerHTML));

          //Response Rate
          if (taskviewCols.ResponseRate == undefined) { dTemplate = dTemplate.replace("bRate", "displayNone"); }
          else {
              if (dColumns[taskviewCols.ResponseRate] != null) {
                  dTemplate = dTemplate.replace("$rr$", dColumns[taskviewCols.ResponseRate].innerHTML);


                  //si on n'a pas d'element html (c'est vide), on cache la cellule au complet
                  //on verifie avec le % dans les cas qu'on n'a pas de progress bar mais qu'on a une valeur de %
                  if (dColumns[taskviewCols.ResponseRate].innerHTML.indexOf("div") == -1 && dColumns[taskviewCols.ResponseRate].innerHTML.indexOf("%") == -1) dTemplate = dTemplate.replace("bRate", "displayNone");
              }
          }

          //Task Type - Status - autres...
          if (taskviewCols.TaskType == undefined) { dTemplate = dTemplate.replace("bType", "displayNone"); }
          else {
              if (dColumns[taskviewCols.TaskType] != null) {
                  dTemplate = dTemplate.replace("$taskType$", dColumns[taskviewCols.TaskType].innerHTML);
              }
          }
 
          if (dColumns[taskviewCols.Status] != null) {
              dTemplate = dTemplate.replace("$status$", "<strong>" + ___svOptInOutColumn___ + ": </strong>" + dColumns[taskviewCols.Status].innerHTML);
          }
          else {
              dTemplate = dTemplate.replace("$status$", "");
          }

          if (dColumns[taskviewCols.EndDate] != null && dColumns[taskviewCols.EndDate].getElementsByTagName('div')[0] != null) {
              if (taskviewCols.EndDate != undefined) { dTemplate = dTemplate.replace("$other$", " - <strong>" + ___BBLINKColDateEcheance___ + ": </strong>" + dColumns[taskviewCols.EndDate].getElementsByTagName('div')[0].innerHTML); }
              else { dTemplate = dTemplate.replace("$other$", ""); }
              if (taskviewCols.Alert == undefined) {
                  dTemplate = dTemplate.replace("imgAlert", "displayNone");
                  dTemplate = dTemplate.replace("$alert$", "");
              }
              else {
                  if (dColumns[taskviewCols.Alert].innerHTML == "&nbsp;") {
                      dTemplate = dTemplate.replace("imgAlert", "displayNone");
                      dTemplate = dTemplate.replace("$alert$", "");
                  }
                  else {
                      dTemplate = dTemplate.replace("$alert$", " - ");
                      dTemplate = dTemplate.replace(/msgId/g, dColumns[taskviewCols.Alert].id + '_alert');
                      dTemplate = dTemplate.replace("$msgTitle$", dColumns[taskviewCols.Alert].getElementsByTagName('span')[0].innerHTML);
                      dTemplate = dTemplate.replace("$msgContent$", dColumns[taskviewCols.Alert].getElementsByTagName('span')[1].innerHTML);
                      $(".bMsg *").addClass('bBox');
                  }
              }
          }
          else {
              // dColumns[taskviewCols.EndDate] == null
              if (taskviewCols.EndDate == undefined)
              { dTemplate = dTemplate.replace("$other$", ""); }
              if (taskviewCols.Alert == undefined) {
                  dTemplate = dTemplate.replace("imgAlert", "displayNone");
                  dTemplate = dTemplate.replace("$alert$", "");
              }
              else {
                  if (dColumns[taskviewCols.Alert].innerHTML == "&nbsp;") {
                      dTemplate = dTemplate.replace("imgAlert", "displayNone");
                      dTemplate = dTemplate.replace("$alert$", "");
                  }
                  else {
                      dTemplate = dTemplate.replace("$alert$", " - ");
                      dTemplate = dTemplate.replace(/msgId/g, dColumns[taskviewCols.Alert].id + '_alert');
                      dTemplate = dTemplate.replace("$msgTitle$", dColumns[taskviewCols.Alert].getElementsByTagName('span')[0].innerHTML);
                      dTemplate = dTemplate.replace("$msgContent$", dColumns[taskviewCols.Alert].getElementsByTagName('span')[1].innerHTML);
                      $(".bMsg *").addClass('bBox');
                  }
              }
          }

          //Hyperlink display
          if (taskviewCols.Link == undefined) { dTemplate = dTemplate.replace("bLink", "displayNone"); }
          else {
              if (dColumns[taskviewCols.Link] != null) {
                  dTemplate = dTemplate.replace("$link$", dColumns[taskviewCols.Link].innerHTML);
              }
          }

          //GradeBlocking
          if (taskviewCols.GradeBlocking == undefined) { dTemplate = dTemplate.replace("bGrade", "displayNone"); }
          else {
              if (dColumns[taskviewCols.GradeBlocking] != null) {
                  if (dColumns[taskviewCols.GradeBlocking].innerHTML == "&nbsp;") { dTemplate = dTemplate.replace("bGrade", "displayNone"); }
                  else {
                      dTemplate = dTemplate.replace("$gradeBlocking$", ___BlockColGradeBlocking___);
                      dTemplate = dTemplate.replace("$value$", dColumns[taskviewCols.GradeBlocking].innerHTML);
                  }
              }
          }
 
          return dTemplate;
      }

      function expand(divId, h, eImg) { $('#' + divId).animate({ height: h }, animDuration); eImg.src = eImg.src.replace('-w.png', '-g.png'); }
      function collapse(divId, eImg) { $('#' + divId).animate({ height: 0 }, animDuration); eImg.src = eImg.src.replace('-g.png', '-w.png'); }

      function expandCollapseSearch(el) {
          var h = document.getElementById('searchDiv').style.height;
          if ((h == "0px") || (h == "")) { expand('searchDiv', 60, el); }
          else { collapse('searchDiv', el); }

          collapse('descDiv', $('.imgDesc')[0]);
          collapse('filterDiv', $('.imgFilter')[0]);

          setTimeout(function() { publishIframeHeight() }, animDuration);
      }

      function expandCollapseDesc(el) {
          var h = document.getElementById('descP').offsetHeight + 25;
          var h2 = document.getElementById('descDiv').style.height;

          //Étant donné que la description est en position absolute, il faut calculer et setter le height du appContainer
          if ((h2 == "0px") || (h2 == "")) {
              expand('descDiv', eval(h), el);
              setTimeout(function() {
                  if ($("#appContainer").height() < $("#descDiv").height())
                      $("#appContainer").height($("#descDiv").height());
              }, animDuration);
          }
          else { collapse('descDiv', el); setTimeout(function() { $("#appContainer").css("height", ""); }, animDuration); }

          collapse('searchDiv', $('.imgLoupe')[0]);
          collapse('filterDiv', $('.imgFilter')[0]);

          setTimeout(function() { publishIframeHeight(); }, animDuration);
      }

      function expandCollapseFilters(el) {
          var h = document.getElementById('filterTable').offsetHeight + 35;
          var h2 = document.getElementById('filterDiv').style.height;

          //Étant donné que les filtres sont en position absolute, il faut calculer et setter le height du appContainer
          //Mêmes calculs que dans checkFiltersBox, sauf qu'on a besoin de détecter si on est en mode collapse/expand
          if ((h2 == "0px") || (h2 == "")) {
              expand('filterDiv', eval(h), el);
              setTimeout(function() {
                  if ($("#appContainer").height() < $("#filterDiv").height())
                      $("#appContainer").height($("#filterDiv").height());
              }, animDuration);
          }
          else { collapse('filterDiv', el); setTimeout(function() { $("#appContainer").css("height", ""); }, animDuration); }

          collapse('searchDiv', $('.imgLoupe')[0]);
          collapse('descDiv', $('.imgDesc')[0]);

          setTimeout(function() { publishIframeHeight(); }, animDuration);
      }

      function expandCollapseMsg(divId) {
          var h = document.getElementById(divId).getElementsByTagName('p')[0].offsetHeight + 10;
          var h2 = document.getElementById(divId).style.height;

          if ((h2 == "0px") || (h2 == "")) { $('#' + divId).animate({ height: eval(h) }, animDuration); }
          else { $('#' + divId).animate({ height: 0 }, animDuration); }

          setTimeout(function() { publishIframeHeight() }, animDuration);
      }


      function loadFilters() {
          tFilters = document.getElementById('idtableFiltersOptions');
          if (tFilters != undefined) {

              var filterContainer = "<table class='tbFilters' id='filterTable' border='0' cellpadding='0' cellspacing='0'>\n";
              filterContainer += "<tr><td><p class='filterTitle'>" + ___BBLINKColFiltre___ + "</p></td></tr>\n";
              var trs = tFilters.getElementsByTagName('tr');

              //On veut ajouter ces filtres en premier
              var ddl = ["idDDLCol1", "idDDLColCat", "idDDLColSubCat", "idDDLCol2", "idDDLCol4"];

              //Aller boucler sur ces filtres et les rajouter au début si nécessaire
              for (var i = 0; i < ddl.length; i++) {
                  var obj = $(trs).find("select[name='" + ddl[i] + "']").get(0);
                  if (obj != undefined) {
                      filterContainer += "<tr>\n";
                      var td1 = $(obj).closest("td").prev();  //Contient le label
                      var td2 = $(obj).closest("td"); //Contientle input
                      filterContainer += $(td1).get(0).outerHTML + "\n";
                      filterContainer += $(td2).get(0).outerHTML + "\n";
                      filterContainer += "</tr>\n";
                  }
              }

              for (var i = 0; i < trs.length; i++) {
                  filterContainer += "<tr>\n";
                  var tds = trs[i].getElementsByTagName('td');
                  for (var j = 0; j < 2; j++) { filterContainer += "<td>" + tds[j].innerHTML + "</td>\n"; }
                  filterContainer += "</tr>\n";
              }

              for (var i = 0; i < trs.length; i++) {
                  filterContainer += "<tr>\n";
                  var tds = trs[i].getElementsByTagName('td');
                  for (var j = 3; j < 5; j++) { filterContainer += "<td>" + ((tds[j] != undefined) ? tds[j].innerHTML : "") + "</td>\n"; }
                  filterContainer += "</tr>\n";
              }

              filterContainer += "</table>\n";
              document.getElementById('filterDiv').innerHTML = filterContainer;

              $("#filterTable *").addClass('bBox');
              $("#idtableFiltersOptions *").removeAttr('id');

              //Pour que les filtres n'aparaissent pas deux fois
              for (var i = 0; i < ddl.length; i++) {
                  //On va vérifier si le filtre existe en double
                  var obj = $("select[name='" + ddl[i] + "']").get(2);
                  if (obj != undefined) {
                      $(obj).closest("tr").remove();
                  }
              }
          }
      }

      /** REDEFINITION au retour du getGridView */
      function ___ongetGridView(result) {
          WaitMachineProcessRemove(___WaitLoadingGridView___);   //Enlever les processes du waitMachine
          if (result[0] == "error" && result[1] == "error") {
              gotoURL('error500.aspx?errormessage=' + result[2]);
          }
          else {
              document.getElementById('tViewData').innerHTML = result[0];
              document.getElementById('blockGridViewPagingLabel').innerHTML = result[1];
              document.getElementById('blockGridViewPaging').innerHTML = result[2];
              taskviewCols = eval('(' + result[3] + ')');
              loadTaskList();
          }

          setTimeout(function() {
              checkFiltersBox();
              publishIframeHeight();
          }, 500);
      }

      //Étant donné que les filtres sont en position absolute, il faut calculer et setter le height du appContainer
      //pour le crossDomainIframeResize
      //Des calculs similaires sont effectués dans expandCollapseFilters()
      function checkFiltersBox() {
          if ($("#appContainer").height() < $("#filterDiv").height()) { $("#appContainer").height($("#filterDiv").height()); }
          else { $("#appContainer").css("height", ""); }
      }

      window.onresize = function() { };
  </script>
